services:
  go2rtc:
    image: alexxit/go2rtc:latest
    restart: unless-stopped
    expose:
      - "1984"
      - "8554"
      - "8555"

  # Backend API Service
  saas-backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      - APP_NAME=${APP_NAME:-Simple-NVR-CCTV}
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your-secret-key-change-in-production}
      - JWT_EXPIRATION_SECONDS=${JWT_EXPIRATION_SECONDS:-604800}
      - BODY_LIMIT=${BODY_LIMIT:-100M}
      - DB_DRIVER=postgres
      - DB_HOST=${DB_HOST:-host.docker.internal}
      - DB_PORT=${DB_PORT:-5432}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-postgres}
      - DB_SCHEMA=${DB_SCHEMA:-askclause}
      - DB_SSL_MODE=${DB_SSL_MODE:-disable}
      - DB_MAX_OPEN_CONNS=${DB_MAX_OPEN_CONNS:-100}
      - DB_MAX_IDLE_CONNS=${DB_MAX_IDLE_CONNS:-10}
      - DB_CONN_MAX_LIFETIME=${DB_CONN_MAX_LIFETIME:-300}
      - DB_CONN_MAX_IDLE_TIME=${DB_CONN_MAX_IDLE_TIME:-60}
      - DEBUG=${DEBUG:-false}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JOB_HEARTBEAT_SECONDS=${JOB_HEARTBEAT_SECONDS:-60}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_ENCRYPTION=${SMTP_ENCRYPTION:-tls}
      - SMTP_SENDER_ADDRESS=${SMTP_SENDER_ADDRESS:-}
      - SMTP_SENDER_NAME=${SMTP_SENDER_NAME:-SaaS Application}
      - PHONE_COUNTRY_CODE_DEFAULT=${PHONE_COUNTRY_CODE_DEFAULT:-62}
      - RECORDINGS_ROOT=${RECORDINGS_ROOT:-/app/recordings}
      - FFMPEG_BIN=${FFMPEG_BIN:-ffmpeg}
      - GO2RTC_API_URL=${GO2RTC_API_URL:-http://go2rtc:1984}
      - GO2RTC_RTSP_URL=${GO2RTC_RTSP_URL:-rtsp://go2rtc:8554}
      - GO2RTC_STREAM_PREFIX=${GO2RTC_STREAM_PREFIX:-camera_}
      - NVR_SEGMENT_SECONDS=${NVR_SEGMENT_SECONDS:-3600}
      - NVR_RETENTION_INTERVAL_SECONDS=${NVR_RETENTION_INTERVAL_SECONDS:-300}
      - NVR_HEALTH_STALE_SECONDS=${NVR_HEALTH_STALE_SECONDS:-600}
      - NVR_SNAPSHOT_CACHE_SECONDS=${NVR_SNAPSHOT_CACHE_SECONDS:-60}
      - NVR_SNAPSHOT_TIMEOUT_SECONDS=${NVR_SNAPSHOT_TIMEOUT_SECONDS:-10}
      - NVR_WORKER_INITIAL_BACKOFF_SECONDS=${NVR_WORKER_INITIAL_BACKOFF_SECONDS:-2}
      - NVR_WORKER_MAX_BACKOFF_SECONDS=${NVR_WORKER_MAX_BACKOFF_SECONDS:-60}
      - NVR_WORKER_STOP_TIMEOUT_SECONDS=${NVR_WORKER_STOP_TIMEOUT_SECONDS:-10}
    volumes:
      - ./recordings:/app/recordings
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      - go2rtc

  # Combined Reverse Proxy + Frontend Service (no nginx needed)
  saas-rus-proxy:
    build:
      context: .
      dockerfile: Dockerfile.combined
      args:
        - VITE_API_URL=${VITE_API_URL:-}
        - VITE_APP_NAME=${VITE_APP_NAME:-SaaS Admin}
    restart: unless-stopped
    expose:
      - "7777"
    environment:
      - PORT=7777
      - BACKEND_URL=http://saas-backend:3001
      - GO2RTC_URL=${GO2RTC_URL:-http://go2rtc:1984}
      - STATIC_DIR=/app/static
      - PUBLIC_API_URL=${PUBLIC_API_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7777"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      saas-backend:
        condition: service_healthy
